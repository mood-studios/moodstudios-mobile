name: mood_studios_mobile
description: Mood Studios — Photography booking & client app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  intl: ^0.19.0
  socket_io_client: ^3.0.2
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  open_filex: ^4.5.0
  gal: ^2.3.1
  firebase_core: ^3.15.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/mood_logo.png
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/mood_logo.png
